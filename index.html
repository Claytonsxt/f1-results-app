<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Race Results</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f0f;
            min-height: 100vh;
            padding: 20px;
            color: #ffffff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #1a1a1a;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            border: 2px solid #FF1801;
        }

        header {
            background: linear-gradient(90deg, #000000 0%, #1a1a1a 50%, #000000 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
            border-bottom: 4px solid #FF1801;
            position: relative;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #FF1801, #FFB81C, #FF1801);
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #FFB81C;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
            color: #e0e0e0;
            letter-spacing: 1px;
        }

        .controls {
            padding: 20px;
            background: #252525;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            border-bottom: 2px solid #FF1801;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-group label {
            font-weight: 700;
            font-size: 0.9em;
            color: #FFB81C;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .control-group input,
        .control-group select {
            padding: 12px 14px;
            border: 2px solid #FF1801;
            border-radius: 4px;
            font-size: 1em;
            transition: all 0.3s;
            background: #1a1a1a;
            color: #ffffff;
        }

        .control-group input::placeholder {
            color: #888;
        }

        .control-group input:focus,
        .control-group select:focus {
            outline: none;
            border-color: #FFB81C;
            box-shadow: 0 0 0 3px rgba(255, 184, 28, 0.2);
        }

        .control-group input {
            flex: 1;
            min-width: 200px;
        }

        .control-group select {
            min-width: 150px;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 12px 24px;
            border: 2px solid #FF1801;
            border-radius: 4px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: #FF1801;
            color: white;
        }

        .btn-primary:hover {
            background: #FFB81C;
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 24, 1, 0.5);
        }

        .btn-secondary {
            background: #333;
            color: #FFB81C;
            border-color: #FFB81C;
        }

        .btn-secondary:hover {
            background: #444;
            box-shadow: 0 5px 15px rgba(255, 184, 28, 0.3);
        }

        .btn-back {
            background: #FF1801;
            color: white;
            margin-bottom: 20px;
        }

        .btn-back:hover {
            background: #FFB81C;
            color: #000;
        }

        .content {
            padding: 20px;
            background: #0f0f0f;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #1a1a1a;
            border: 1px solid #333;
        }

        .results-table thead {
            background: #252525;
            border-bottom: 3px solid #FF1801;
        }

        .results-table th {
            padding: 15px 12px;
            text-align: left;
            font-weight: 700;
            color: #FFB81C;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.9em;
        }

        .results-table td {
            padding: 14px 12px;
            border-bottom: 1px solid #333;
            color: #e0e0e0;
        }

        .results-table tbody tr {
            transition: background 0.2s;
        }

        .results-table tbody tr:hover {
            background: #252525;
            cursor: pointer;
        }

        .position-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.95em;
            white-space: nowrap;
        }

        .position-badge.p1 {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #333;
        }

        .position-badge.p2 {
            background: linear-gradient(135deg, #C0C0C0 0%, #808080 100%);
            color: white;
        }

        .position-badge.p3 {
            background: linear-gradient(135deg, #CD7F32 0%, #8B4513 100%);
            color: white;
        }

        .position-badge.p4to10 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .position-badge.p11plus {
            background: linear-gradient(135deg, #9e9e9e 0%, #616161 100%);
            color: white;
        }

        .position-badge.dnf {
            background: #d32f2f;
            color: white;
        }

        .position-emoji {
            font-size: 1.2em;
        }

        .race-detail {
            max-width: 800px;
        }

        .race-header {
            background: linear-gradient(90deg, #1a1a1a 0%, #252525 50%, #1a1a1a 100%);
            border-left: 5px solid #FF1801;
            border-top: 2px solid #FFB81C;
            color: white;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .race-header h2 {
            font-size: 2.2em;
            margin-bottom: 10px;
            color: #FFB81C;
            font-weight: 900;
        }

        .race-header p {
            font-size: 1.1em;
            opacity: 0.9;
            color: #e0e0e0;
        }

        .race-results-detail {
            width: 100%;
            border-collapse: collapse;
            background: #1a1a1a;
            border: 1px solid #333;
        }

        .race-results-detail thead {
            background: #252525;
            border-bottom: 3px solid #FF1801;
        }

        .race-results-detail th {
            padding: 15px 12px;
            text-align: left;
            font-weight: 700;
            color: #FFB81C;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.9em;
        }

        .race-results-detail td {
            padding: 14px 12px;
            border-bottom: 1px solid #333;
            color: #e0e0e0;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .error {
            background: #5d1f1a;
            color: #FF6B6B;
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
            border-left: 4px solid #FF1801;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .season-break {
            background: linear-gradient(90deg, #FF1801, #FFB81C, #FF1801);
            height: 50px;
            font-weight: 900;
            color: #000;
            font-size: 1.2em;
            text-align: center;
            vertical-align: middle;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .season-break-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 50px;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.3);
        }

        .race-group-row {
            background: #252525 !important;
            font-weight: 700;
            cursor: pointer;
            user-select: none;
            border-left: 4px solid #FF1801;
        }

        .race-group-row:hover {
            background: #333 !important;
        }

        .race-group-row td:first-child {
            padding-left: 25px;
            color: #FFB81C;
        }

        .expand-icon {
            display: inline-block;
            margin-right: 8px;
            font-size: 0.9em;
            transition: transform 0.2s;
            color: #FFB81C;
        }

        .expand-icon.expanded {
            transform: rotate(90deg);
        }

        .race-result-row {
            background: #1a1a1a;
            font-size: 0.95em;
        }

        .race-result-row td:first-child {
            padding-left: 40px;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            header {
                padding: 25px 15px;
            }

            .controls {
                flex-direction: column;
            }

            .control-group input {
                min-width: unset;
            }

            .results-table {
                font-size: 0.85em;
            }

            .results-table th,
            .results-table td {
                padding: 10px 8px;
            }

            .season-break {
                height: 40px;
            }

            .season-break-cell {
                height: 40px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [data, setData] = useState({
                results: [],
                drivers: {},
                constructors: {},
                races: {},
            });
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [currentPage, setCurrentPage] = useState('list'); // 'list' or 'detail'
            const [selectedRaceId, setSelectedRaceId] = useState(null);
            const [seasonFilter, setSeasonFilter] = useState('');
            const [searchDriver, setSearchDriver] = useState('');
            const [searchRace, setSearchRace] = useState('');
            const [seasons, setSeasons] = useState([]);
            const [expandedRaces, setExpandedRaces] = useState({});

            // Load CSV data
            useEffect(() => {
                const loadData = async () => {
                    try {
                        setLoading(true);
                        setError(null);

                        const basePath = window.location.pathname.includes('github.io') 
                            ? '/f1-results-app/public/' 
                            : './public/';

                        const [resultsText, driversText, constructorsText, racesText] = await Promise.all([
                            fetch(`${basePath}results.csv`).then(r => r.text()),
                            fetch(`${basePath}drivers.csv`).then(r => r.text()),
                            fetch(`${basePath}constructors.csv`).then(r => r.text()),
                            fetch(`${basePath}races.csv`).then(r => r.text()),
                        ]);

                        // Parse CSVs
                        const results = Papa.parse(resultsText, { header: true }).data.filter(r => r.resultId);
                        const drivers = Papa.parse(driversText, { header: true }).data.filter(d => d.driverId);
                        const constructors = Papa.parse(constructorsText, { header: true }).data.filter(c => c.constructorId);
                        const races = Papa.parse(racesText, { header: true }).data.filter(r => r.raceId);

                        // Create lookup objects
                        const driversMap = {};
                        drivers.forEach(d => {
                            driversMap[d.driverId] = d;
                        });

                        const constructorsMap = {};
                        constructors.forEach(c => {
                            constructorsMap[c.constructorId] = c;
                        });

                        const racesMap = {};
                        races.forEach(r => {
                            racesMap[r.raceId] = r;
                        });

                        // Extract unique seasons
                        const uniqueSeasons = [...new Set(races.map(r => r.year))].sort((a, b) => b - a);
                        setSeasons(uniqueSeasons);

                        setData({
                            results,
                            drivers: driversMap,
                            constructors: constructorsMap,
                            races: racesMap,
                        });
                    } catch (err) {
                        setError(`Failed to load data: ${err.message}`);
                        console.error(err);
                    } finally {
                        setLoading(false);
                    }
                };

                loadData();
            }, []);

            // Filter and search results
            const filteredResults = data.results.filter(result => {
                const race = data.races[result.raceId];
                const driver = data.drivers[result.driverId];
                const constructor = data.constructors[result.constructorId];

                if (!race || !driver || !constructor) return false;

                const matchesSeason = !seasonFilter || race.year === seasonFilter;
                const matchesDriver = !searchDriver || 
                    `${driver.forename} ${driver.surname}`.toLowerCase().includes(searchDriver.toLowerCase());
                const matchesRace = !searchRace || 
                    race.name.toLowerCase().includes(searchRace.toLowerCase());

                return matchesSeason && matchesDriver && matchesRace;
            });

            // Sort results by race date (newest first)
            const sortedResults = [...filteredResults].sort((a, b) => {
                const raceA = data.races[a.raceId];
                const raceB = data.races[b.raceId];
                return new Date(raceB.date) - new Date(raceA.date);
            });

            const handleRaceClick = (raceId) => {
                setSelectedRaceId(raceId);
                setCurrentPage('detail');
            };

            const handleBack = () => {
                setCurrentPage('list');
                setSelectedRaceId(null);
            };

            const handleReset = () => {
                setSeasonFilter('');
                setSearchDriver('');
                setSearchRace('');
            };

            const getPositionClass = (position) => {
                if (!position || position === '\\N') return 'dnf';
                const pos = parseInt(position);
                if (pos === 1) return 'p1';
                if (pos === 2) return 'p2';
                if (pos === 3) return 'p3';
                if (pos <= 10) return 'p4to10';
                return 'p11plus';
            };

            const getPositionEmoji = (position) => {
                if (!position || position === '\\N') return '✗';
                const pos = parseInt(position);
                if (pos === 1) return '🥇';
                if (pos === 2) return '🥈';
                if (pos === 3) return '🥉';
                return '🏁';
            };

            if (loading) {
                return (
                    <div className="container">
                        <header>
                            <h1>🏎️ FORMULA 1 RESULTS 🏎️</h1>
                        </header>
                        <div className="content">
                            <div className="loading">Loading data...</div>
                        </div>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="container">
                        <header>
                            <h1>🏎️ FORMULA 1 RESULTS 🏎️</h1>
                        </header>
                        <div className="content">
                            <div className="error">{error}</div>
                        </div>
                    </div>
                );
            }

            if (currentPage === 'detail') {
                const race = data.races[selectedRaceId];
                const raceResults = data.results.filter(r => r.raceId === selectedRaceId);

                return (
                    <div className="container">
                        <header>
                            <h1>🏎️ FORMULA 1 RESULTS 🏎️</h1>
                        </header>
                        <div className="content">
                            <button className="btn-back" onClick={handleBack}>← Back to Results</button>
                            <div className="race-detail">
                                {race && (
                                    <>
                                        <div className="race-header">
                                            <h2>{race.name}</h2>
                                            <p>{new Date(race.date).toLocaleDateString('en-US', { 
                                                year: 'numeric', 
                                                month: 'long', 
                                                day: 'numeric' 
                                            })}</p>
                                        </div>
                                        <table className="race-results-detail">
                                            <thead>
                                                <tr>
                                                    <th>Position</th>
                                                    <th>Driver</th>
                                                    <th>Constructor</th>
                                                    <th>Points</th>
                                                    <th>Laps</th>
                                                    <th>Time</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {raceResults.map(result => {
                                                    const driver = data.drivers[result.driverId];
                                                    const constructor = data.constructors[result.constructorId];
                                                    const isDNF = !result.position || result.position === '\\N';
                                                    const position = isDNF ? 'DNF' : result.position;
                                                    const positionClass = getPositionClass(result.position);
                                                    const emoji = getPositionEmoji(result.position);

                                                    return (
                                                        <tr key={result.resultId}>
                                                            <td>
                                                                <span className={`position-badge ${positionClass}`}>
                                                                    <span className="position-emoji">{emoji}</span>
                                                                    {position}
                                                                </span>
                                                            </td>
                                                            <td>{driver.forename} {driver.surname}</td>
                                                            <td>{constructor.name}</td>
                                                            <td>{result.points}</td>
                                                            <td>{result.laps}</td>
                                                            <td>{result.time || '-'}</td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="container">
                    <header>
                        <h1>�️ FORMULA 1 RESULTS 🏎️</h1>
                        <p>EXPLORE FORMULA 1 RACE RESULTS</p>
                    </header>
                    <div className="controls">
                        <div className="control-group">
                            <label htmlFor="season">Season</label>
                            <select 
                                id="season"
                                value={seasonFilter} 
                                onChange={e => setSeasonFilter(e.target.value)}
                            >
                                <option value="">All Seasons</option>
                                {seasons.map(year => (
                                    <option key={year} value={year}>{year}</option>
                                ))}
                            </select>
                        </div>
                        <div className="control-group" style={{ flex: 1 }}>
                            <label htmlFor="driver">Search Driver</label>
                            <input 
                                id="driver"
                                type="text" 
                                placeholder="e.g., Lewis Hamilton"
                                value={searchDriver}
                                onChange={e => setSearchDriver(e.target.value)}
                            />
                        </div>
                        <div className="control-group" style={{ flex: 1 }}>
                            <label htmlFor="race">Search Race</label>
                            <input 
                                id="race"
                                type="text" 
                                placeholder="e.g., Monaco Grand Prix"
                                value={searchRace}
                                onChange={e => setSearchRace(e.target.value)}
                            />
                        </div>
                        <div className="button-group">
                            <button className="btn-secondary" onClick={handleReset}>Reset</button>
                        </div>
                    </div>
                    <div className="content">
                        {sortedResults.length === 0 ? (
                            <div className="no-results">
                                <p>No results found. Try adjusting your filters or search terms.</p>
                            </div>
                        ) : (
                            <>
                                <p style={{ color: '#666', marginBottom: '10px' }}>
                                    Showing {sortedResults.length} results
                                </p>
                                <table className="results-table">
                                    <thead>
                                        <tr>
                                            <th>Race</th>
                                            <th style={{ width: '100px' }}>Results Count</th>
                                            <th>Date</th>
                                            <th>Driver</th>
                                            <th>Constructor</th>
                                            <th>Position</th>
                                            <th>Points</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {(() => {
                                            // Group results by season, then by race name
                                            const groupedBySeasonAndRace = {};
                                            sortedResults.forEach(result => {
                                                const race = data.races[result.raceId];
                                                const season = race.year;
                                                const raceName = race.name;
                                                const groupKey = `${season}-${raceName}`;
                                                
                                                if (!groupedBySeasonAndRace[groupKey]) {
                                                    groupedBySeasonAndRace[groupKey] = {
                                                        season,
                                                        raceName,
                                                        results: []
                                                    };
                                                }
                                                groupedBySeasonAndRace[groupKey].results.push(result);
                                            });

                                            // Sort groups: newest seasons first, then by most recent race date
                                            const sortedGroups = Object.entries(groupedBySeasonAndRace).sort((a, b) => {
                                                const [keyA, groupA] = a;
                                                const [keyB, groupB] = b;
                                                
                                                // First sort by season (descending)
                                                if (groupA.season !== groupB.season) {
                                                    return groupB.season - groupA.season;
                                                }
                                                
                                                // Then sort by most recent race date within same season
                                                const latestDateA = Math.max(...groupA.results.map(r => new Date(data.races[r.raceId].date).getTime()));
                                                const latestDateB = Math.max(...groupB.results.map(r => new Date(data.races[r.raceId].date).getTime()));
                                                return latestDateB - latestDateA;
                                            });

                                            return sortedGroups.map(([groupKey, group], groupIndex) => {
                                                const { season, raceName, results: resultsForRace } = group;
                                                const isExpanded = expandedRaces[groupKey];
                                                const isSeasonBreak = groupIndex > 0 && sortedGroups[groupIndex - 1][1].season !== season;

                                                return [
                                                    isSeasonBreak && (
                                                        <tr key={`season-break-${season}`} className="season-break">
                                                            <td colSpan="7" style={{ padding: 0 }}>
                                                                <div className="season-break-cell">{season} Season</div>
                                                            </td>
                                                        </tr>
                                                    ),
                                                    <tr 
                                                        key={`race-group-${groupKey}`}
                                                        className="race-group-row"
                                                        onClick={() => setExpandedRaces({...expandedRaces, [groupKey]: !isExpanded})}
                                                    >
                                                        <td>
                                                            <span className={`expand-icon ${isExpanded ? 'expanded' : ''}`}>▶</span>
                                                            {raceName}
                                                        </td>
                                                        <td>{resultsForRace.length} result{resultsForRace.length !== 1 ? 's' : ''}</td>
                                                        <td colSpan="5"></td>
                                                    </tr>,
                                                    isExpanded && resultsForRace.map(result => {
                                                        const race = data.races[result.raceId];
                                                        const driver = data.drivers[result.driverId];
                                                        const constructor = data.constructors[result.constructorId];
                                                        const isDNF = !result.position || result.position === '\\N';
                                                        const position = isDNF ? 'DNF' : result.position;
                                                        const positionClass = getPositionClass(result.position);
                                                        const emoji = getPositionEmoji(result.position);

                                                        return (
                                                            <tr 
                                                                key={result.resultId}
                                                                className="race-result-row"
                                                                onClick={() => handleRaceClick(result.raceId)}
                                                            >
                                                                <td>{new Date(race.date).getFullYear()}</td>
                                                                <td>{new Date(race.date).toLocaleDateString()}</td>
                                                                <td>{driver.forename} {driver.surname}</td>
                                                                <td>{constructor.name}</td>
                                                                <td>
                                                                    <span className={`position-badge ${positionClass}`}>
                                                                        <span className="position-emoji">{emoji}</span>
                                                                        {position}
                                                                    </span>
                                                                </td>
                                                                <td>{result.points}</td>
                                                            </tr>
                                                        );
                                                    })
                                                ].filter(Boolean);
                                            }).flat();
                                        })()}
                                    </tbody>
                                </table>
                            </>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
